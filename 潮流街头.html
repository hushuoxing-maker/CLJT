<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>街头制燥 · 潮流街头海报提示词生成器</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Microsoft YaHei",sans-serif;
}

body{

background:linear-gradient(135deg,#0a0a0a,#1a1a1a,#111);

color:#fff;
padding:40px;

}

/* 标题 */

.header{

text-align:center;
margin-bottom:40px;

}

.header h1{

font-size:32px;

background:linear-gradient(90deg,#00ff9c,#ff2dfc);

-webkit-background-clip:text;

color:transparent;

}

/* 输入区域 */

.inputBox{

max-width:900px;
margin:auto;

display:grid;

grid-template-columns:1fr 1fr;
gap:12px;

margin-bottom:40px;

}

.inputBox input{

padding:14px;

border:none;

border-radius:10px;

font-size:15px;

}

.generateBtn{

grid-column:1/3;

padding:16px;

border:none;

background:linear-gradient(45deg,#00ff9c,#ff2dfc);

font-weight:bold;

border-radius:10px;

cursor:pointer;

}

/* 卡片 */

.grid{

display:grid;

grid-template-columns:repeat(auto-fill,minmax(420px,1fr));

gap:24px;

}

.card{

background:rgba(255,255,255,0.06);

border-radius:16px;

padding:22px;

border:1px solid rgba(255,255,255,0.1);

backdrop-filter:blur(10px);

}

.prompt{

font-size:14px;

line-height:1.8;

white-space:pre-wrap;

}

.copyBtn{

margin-top:12px;

background:#fff;

color:#000;

border:none;

padding:8px 16px;

border-radius:8px;

cursor:pointer;

}

</style>

</head>

<body>

<div class="header">

<h1>潮流街头 · 海报提示词生成器</h1>

</div>


<div class="inputBox">

<input id="titleInput" placeholder="输入海报主标题">

<input id="subtitleInput" placeholder="输入海报副标题">

<input id="typeInput" placeholder="输入海报类型（潮牌发布 / 音乐节 / 滑板文化等）">

<button class="generateBtn" onclick="generate()">生成20组提示词</button>

</div>


<div id="result" class="grid"></div>


<script>


const tags=[

"限量发售",

"街头制燥",

"联名企划",

"现场炸裂",

"街头限定",

"潮流发布",

"underground",

"街头艺术"

]


const visuals=[

"滑板、喷漆罐、运动鞋",

"涂鸦墙、地铁站、废弃厂房",

"嘻哈rapper、大金链、音响",

"街舞动作、篮球场、卡车帽",

"破损海报、铁锈、水泥墙"

]


function rand(arr){

return arr[Math.floor(Math.random()*arr.length)]

}


function generate(){

let title=document.getElementById("titleInput").value || "街头文化"

let subtitle=document.getElementById("subtitleInput").value || "地下潮流全面爆发"

let type=document.getElementById("typeInput").value || "潮流文化活动"

let container=document.getElementById("result")

container.innerHTML=""

for(let i=1;i<=20;i++){

let text=`

海报类型：
${type}

主标题：
${title}

副标题：
${subtitle}

辅助文字：
${rand(tags)} / ${rand(tags)} / ${rand(tags)}

核心视觉元素：
${rand(visuals)} + 涂鸦字体墙面 + 喷漆飞溅

视觉表现手法：
贴纸拼贴、海报撕裂、胶带固定、粗粝磨损、荧光色撞击

文字布局：
主标题采用巨型涂鸦字体覆盖画面，副标题以贴纸标签形式出现，辅助文字以 graffiti tag 层叠

风格描述：
地下街头文化、粗粝真实、视觉炸裂、黑白灰基底搭配荧光色

`

let card=document.createElement("div")

card.className="card"

card.innerHTML=`

<div class="prompt">${text}</div>

<button class="copyBtn">复制提示词</button>

`

container.appendChild(card)

let btn=card.querySelector(".copyBtn")

btn.onclick=function(){

navigator.clipboard.writeText(text)

btn.innerText="复制成功"

setTimeout(()=>{

btn.innerText="复制提示词"

},3000)

}

}

}

</script>

</body>

</html>

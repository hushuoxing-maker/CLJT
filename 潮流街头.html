<!DOCTYPE html>
<html lang="zh-CN">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>潮流街头  · 潮流街头海报提示词生成器  - 古月AI智能体</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Microsoft YaHei",sans-serif;
}
body{
  background: linear-gradient(135deg,#0a0a0a,#1a1a1a,#111);
  color:#fff;
  padding:40px;
  min-height:100vh;
}

/* 标题 */
.header{
  text-align:center;
  margin-bottom:40px;
}
.header h1{
  font-size:36px;
  background:linear-gradient(90deg,#00ff9c,#ff2dfc,#ffcb05);
  -webkit-background-clip:text;
  color:transparent;
  letter-spacing:2px;
}

/* 输入区域 */
.inputBox{
  max-width:900px;
  margin:auto;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-bottom:40px;
}
.inputBox input{
  padding:16px;
  border:none;
  border-radius:12px;
  font-size:15px;
  background: linear-gradient(145deg,#1a1a1a,#0f0f0f);
  color:#fff;
}
.generateBtn{
  grid-column:1/3;
  padding:16px;
  border:none;
  background:linear-gradient(45deg,#00ff9c,#ff2dfc,#ffcb05);
  font-weight:bold;
  border-radius:12px;
  cursor:pointer;
  color:#000;
  font-size:16px;
  transition:0.3s;
}
.generateBtn:hover{
  transform:translateY(-2px);
  opacity:.9;
}

/* 卡片布局 */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(420px,1fr));
  gap:24px;
}

/* 卡片 */
.card{
  background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.12));
  backdrop-filter: blur(14px);
  border-radius:20px;
  padding:24px;
  border:1px solid rgba(255,255,255,0.2);
  transition:.3s;
}
.card:hover{
  transform:translateY(-6px);
  box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

/* 文本样式 */
.prompt{
  font-size:14px;
  line-height:1.8;
  white-space:pre-wrap;
}

/* 副标题图框 */
.subtitleBox{
  display:inline-block;
  padding:4px 12px;
  margin:8px 0;
  background: linear-gradient(90deg,#ff2dfc,#00ff9c);
  border-radius:8px;
  font-weight:bold;
  font-size:13px;
  color:#000;
}

/* 辅助文字图框 */
.assistBox{
  display:inline-block;
  padding:3px 10px;
  margin:2px 4px 2px 0;
  background: linear-gradient(90deg,#ffcb05,#ff2dfc);
  border-radius:6px;
  font-size:12px;
  font-weight:600;
  color:#000;
}

/* 复制按钮 */
.copyBtn{
  margin-top:14px;
  background:linear-gradient(45deg,#00ff9c,#ff2dfc,#ffcb05);
  color:#000;
  border:none;
  padding:8px 16px;
  border-radius:8px;
  cursor:pointer;
  font-size:13px;
  transition:0.3s;
}
.copyBtn:hover{
  transform:translateY(-2px);
  opacity:.9;
}
</style>
</head>

<body>

<div class="header">
<h1>潮流街头  · 潮流街头海报提示词生成器  - 古月AI智能体</h1>
</div>

<div class="inputBox">
<input id="titleInput" placeholder="输入海报主标题">
<input id="subtitleInput" placeholder="输入海报副标题">
<input id="typeInput" placeholder="输入海报类型（潮牌发布 / 音乐节 / 滑板文化等）">
<button class="generateBtn" onclick="generate()">生成20组提示词</button>
</div>

<div id="result" class="grid"></div>

<script>
const tags=[
"限量发售",
"街头制燥",
"联名企划",
"现场炸裂",
"街头限定",
"潮流发布",
"underground",
"街头艺术"
];

const visuals=[
"滑板、喷漆罐、运动鞋",
"涂鸦墙、地铁站、废弃厂房",
"嘻哈rapper、大金链、音响",
"街舞动作、篮球场、卡车帽",
"破损海报、铁锈、水泥墙"
];

function rand(arr){
  return arr[Math.floor(Math.random()*arr.length)];
}

function generate(){
  let title=document.getElementById("titleInput").value || "街头文化";
  let subtitle=document.getElementById("subtitleInput").value || "地下潮流全面爆发";
  let type=document.getElementById("typeInput").value || "潮流文化活动";

  let container=document.getElementById("result");
  container.innerHTML="";

  for(let i=1;i<=20;i++){
    // 生成3个辅助文字
    let assistArr=[rand(tags),rand(tags),rand(tags)];
    let assistHTML=assistArr.map(tag=>`<span class="assistBox">${tag}</span>`).join("");

    let textHTML=`
海报类型：${type}

主标题：${title}

副标题：<span class="subtitleBox">${subtitle}</span>

辅助文字：${assistHTML}

核心视觉元素：
${rand(visuals)} + 涂鸦字体墙面 + 喷漆飞溅

视觉表现手法：
贴纸拼贴、海报撕裂、胶带固定、粗粝磨损、荧光色撞击

文字布局：
主标题采用巨型涂鸦字体覆盖画面，副标题以贴纸标签形式出现，辅助文字以 graffiti tag 层叠

风格描述：
地下街头文化、粗粝真实、视觉炸裂、黑白灰基底搭配荧光色
`;

    let card=document.createElement("div");
    card.className="card";
    card.innerHTML=`
      <div class="prompt">${textHTML}</div>
      <button class="copyBtn">复制提示词</button>
    `;
    container.appendChild(card);

    let btn=card.querySelector(".copyBtn");
    btn.onclick=function(){
      // 复制纯文字，不带 HTML 标签
      let plainText = textHTML.replace(/<[^>]+>/g,"");
      navigator.clipboard.writeText(plainText);
      btn.innerText="复制成功";
      setTimeout(()=>{btn.innerText="复制提示词";},3000);
    }
  }
}
</script>

</body>
</html>
